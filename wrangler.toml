name = "just-in-time"
compatibility_date = "2024-03-14"

[assets]
directory = "."
binding = "ASSETS"

# Explicitly exclude node_modules and other large/unnecessary files
exclude = [
  "node_modules",
  "**/node_modules/**",
  ".git",
  ".github",
  ".antigravity",
  "brain",
  "implementation_plan.md",
  "task.md",
  "walkthrough.md",
  "package-lock.json",
  "README.md"
]
